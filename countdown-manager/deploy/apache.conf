# =============================================================================
# Apache VirtualHost — countdown-manager
#
# Required modules (enable with a2enmod on Debian/Ubuntu):
#   mod_proxy        – reverse proxy to dates-api
#   mod_proxy_http   – HTTP backend support
#   mod_headers      – Cache-Control headers on static assets
#   mod_rewrite      – FallbackResource for future client-side routing
#
# Adjust:
#   ServerName   – your actual hostname or IP
#   DocumentRoot – absolute path to the Trunk build output (trunk build --release)
#   SSLCertificateFile / SSLCertificateKeyFile – your cert paths (HTTPS block)
# =============================================================================

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
<VirtualHost *:80>
    ServerName countdown.example.com

    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>

# ── HTTPS ─────────────────────────────────────────────────────────────────────
<VirtualHost *:443>
    ServerName countdown.example.com

    # Path to the output of: trunk build --release
    DocumentRoot /var/www/countdown-manager/dist

    # ── SSL ─────────────────────────────────────────────────────────────────
    SSLEngine On
    SSLCertificateFile     /etc/letsencrypt/live/countdown.example.com/fullchain.pem
    SSLCertificateKeyFile  /etc/letsencrypt/live/countdown.example.com/privkey.pem

    # ── Proxy /api/ → dates-api (wasmtime serve on loopback) ─────────────────
    # Strips the /api/ prefix so /api/dates → http://127.0.0.1:19697/dates
    ProxyPreserveHost Off
    ProxyPass        /api/  http://127.0.0.1:19697/
    ProxyPassReverse /api/  http://127.0.0.1:19697/

    # ── Static files ──────────────────────────────────────────────────────────
    <Directory /var/www/countdown-manager/dist>
        Options -Indexes -MultiViews
        AllowOverride None
        Require all granted

        # Support future client-side routing (leptos_router) — serve index.html
        # for any path that doesn't match a real file.
        FallbackResource /index.html
    </Directory>

    # ── Caching ───────────────────────────────────────────────────────────────
    # Trunk hashes WASM/JS/CSS filenames on release builds, so these are safe
    # to cache indefinitely.
    <LocationMatch "\.(wasm|js|css)$">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </LocationMatch>

    # The HTML entry point must revalidate so browsers pick up new hashed assets.
    <Location "/index.html">
        Header set Cache-Control "no-cache, must-revalidate"
    </Location>

    # ── Logs ──────────────────────────────────────────────────────────────────
    ErrorLog  ${APACHE_LOG_DIR}/countdown-manager-error.log
    CustomLog ${APACHE_LOG_DIR}/countdown-manager-access.log combined
</VirtualHost>
